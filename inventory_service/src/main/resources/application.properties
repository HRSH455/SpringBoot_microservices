spring.application.name=inventory_service
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3308/inventory_service
spring.datasource.username=root
spring.datasource.password=mysql
spring.jpa.hibernate.ddl-auto=none
server.port=8082

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Observability - Prometheus & Tracing
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.tracing.zipkin.endpoint=http://tempo:9411/api/v2/spans

# Loki / Tempo URLs
loki.url=http://loki:3100
tempo.url=http://tempo:3200

# Logging pattern with trace/span ids
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]