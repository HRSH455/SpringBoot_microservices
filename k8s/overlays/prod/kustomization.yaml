apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../base

namespace: apps

namePrefix: prod-

commonLabels:
  environment: prod

replicas:
  - name: product-service
    count: 2
  - name: order-service
    count: 2
  - name: api-gateway
    count: 3
  - name: frontend
    count: 2

images:
  - name: product-service
    newTag: v1.0.0
  - name: order-service
    newTag: v1.0.0
  - name: inventory-service
    newTag: v1.0.0
  - name: notification-service
    newTag: v1.0.0
  - name: api-gateway
    newTag: v1.0.0
  - name: frontend
    newTag: v1.0.0

patchesJson6902:
  - target:
      group: apps
      version: v1
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/strategy/type
        value: RollingUpdate
      - op: add
        path: /spec/strategy/rollingUpdate
        value:
          maxSurge: 1
          maxUnavailable: 0
