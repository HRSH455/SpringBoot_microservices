spring:
  application:
    name: order-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:k8s}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 100
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 10000
      idle-timeout: 300000
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        linger.ms: 10
  jackson:
    serialization:
      indent-output: false
      write-dates-as-timestamps: false

server:
  port: 8081
  shutdown: graceful
  compression:
    enabled: true
    min-response-size: 1024

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics
      base-path: /actuator
    health:
      show-details: when-authorized
      livenessState:
        enabled: true
      readinessState:
        enabled: true
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:dev}
  tracing:
    enabled: true
    sampling:
        probability: 1.0
    propagation:
        type: b3_multi
  management:
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://tempo:9411/api/v2/spans}
  observations:
    key-values:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.microservices: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    org.springframework.kafka: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      inventory-service:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2s
        recordExceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.HttpServerErrorException
  retry:
    instances:
      inventory-service:
        maxAttempts: 3
        waitDuration: 1000
        retryExceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException
        ignoreExceptions:
          - java.lang.IllegalArgumentException
  timeout:
    instances:
      inventory-service:
        timeoutDuration: 5s
        cancelRunningFuture: true
  bulkhead:
    instances:
      inventory-service:
        maxConcurrentCalls: 100
        maxWaitDuration: 10ms

# HTTP Client Config (RestClient)
app:
  http:
    inventory-service:
      url: ${INVENTORY_SERVICE_URL:http://inventory-service:8082}
      connect-timeout: 5000
      read-timeout: 10000

# CORS Configuration
cors:
  allowed-origins: http://localhost:4200,http://frontend.localdev.me
  allowed-methods: GET,POST,PUT,DELETE
  allowed-headers: "*"
  max-age: 3600
