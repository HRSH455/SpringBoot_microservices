

version: "3.9"

networks:
  observability:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus


    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - observability

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - observability

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    command: -config.file=/etc/tempo/tempo.yml
    volumes:
      - ./docker/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
      - "9411:9411" # Zipkin receiver
    networks:
      - observability

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - observability
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - observability
    depends_on:
      - prometheus
      - loki
      - tempo

  api-gateway:
    build:
      context: ./work/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "9000:9000"
    networks:
      - observability
    depends_on:
      - prometheus
      - loki
      - tempo
      - grafana

  product-service:
    build:
      context: ./work/product-service
      dockerfile: Dockerfile
    container_name: product-service
    ports:
      - "8080:8080"
    networks:
      - observability
    depends_on:
      - prometheus
      - loki
      - tempo
      - grafana

  order-service:
    build:
      context: ./work/order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8081:8081"
    networks:
      - observability
    depends_on:
      - prometheus
      - loki
      - tempo
      - grafana

  inventory-service:
    build:
      context: ./work/inventory_service
      dockerfile: Dockerfile
    container_name: inventory-service
    ports:
      - "8082:8082"
    networks:
      - observability
    depends_on:
      - prometheus
      - loki
      - tempo
      - grafana

  notification-service:
    build:
      context: ./work/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8083:8083"
    networks:
      - observability
    depends_on:
      - prometheus
      - loki
      - tempo
      - grafana

