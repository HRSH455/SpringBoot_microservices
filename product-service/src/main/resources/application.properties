spring.application.name=product-service
spring.data.mongodb.uri = mongodb://root:password@localhost:27017/product-service?authSource=admin
springdoc.swagger-ui.path=/swagger-ui.html

# Observability - Prometheus & Tracing
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.tracing.zipkin.endpoint=http://tempo:9411/api/v2/spans

# Loki / Tempo URLs
loki.url=http://loki:3100
tempo.url=http://tempo:3200

# Logging pattern with trace/span ids
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]