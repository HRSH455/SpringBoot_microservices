apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../base

namespace: apps

namePrefix: dev-

commonLabels:
  environment: dev

patchesStrategicMerge:
  - deployment-replicas.yaml

images:
  - name: product-service
    newTag: latest
  - name: order-service
    newTag: latest
  - name: inventory-service
    newTag: latest
  - name: notification-service
    newTag: latest
  - name: api-gateway
    newTag: latest
  - name: frontend
    newTag: latest

patchesJson6902:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: product-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
