---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-inventory-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-inventory
spec:
  serviceName: mysql-inventory
  replicas: 1
  selector:
    matchLabels:
      app: mysql-inventory
  template:
    metadata:
      labels:
        app: mysql-inventory
    spec:
      containers:
        - name: mysql
          image: mysql:8.0-alpine
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-inventory-credentials
                  key: root-password
            - name: MYSQL_DATABASE
              value: inventory_service
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mysql-inventory-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-inventory
spec:
  clusterIP: None
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: mysql-inventory
---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-inventory-credentials
type: Opaque
stringData:
  root-password: "mysql"
