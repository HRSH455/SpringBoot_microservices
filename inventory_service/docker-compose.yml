version: '4'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-inventory
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: inventory_service
    ports:
      - "3308:3306"
    volumes:
      - ./mysql:/var/lib/mysql-inventory
#      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

